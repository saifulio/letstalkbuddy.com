<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign up — LetsTalkBuddy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@500;600;700;800&family=Karla:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="auth-wrap">
  <a href="/" class="brand" style="font-size:22px;margin-bottom:40px">LetsTalk<em>Buddy</em></a>
  <div class="auth-card">
    <h1>Create your account</h1>
    <p class="auth-sub">Join as a seeker, an advisor, or both.</p>

    <div class="role-tabs">
      <div class="role-tab active" data-role="seeker">I'm looking for advice</div>
      <div class="role-tab" data-role="advisor">I want to offer advice</div>
    </div>

    <div class="form-error" id="form-error"></div>

    <form id="signup-form">
      <div style="display:flex;flex-direction:column;gap:14px;margin-bottom:20px">
        <div class="field">
          <label for="name">Full name</label>
          <input class="input" id="name" type="text" placeholder="Your name" required>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input class="input" id="email" type="email" placeholder="you@example.com" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input class="input" id="password" type="password" placeholder="Create a password (8+ characters)" minlength="8" required>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block" id="submit-btn" style="margin-bottom:16px">Create account</button>
    </form>

    <div class="divider"><div></div><span>or</span><div></div></div>

    <button class="btn btn-outline btn-block" style="padding:13px;font-size:14.5px;margin-bottom:20px" onclick="alert('Google sign-in is not set up yet.')">Continue with Google</button>

    <p style="font-size:12px;line-height:1.6;text-align:center;margin:0 0 20px" class="small-muted">By continuing you agree to LetsTalkBuddy's Terms of Service and Privacy Policy.</p>

    <p style="font-size:14px;text-align:center;margin:0" class="muted">Already have an account? <a href="/login.html" class="link-accent">Log in</a></p>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
let role = new URLSearchParams(location.search).get('role') === 'advisor' ? 'advisor' : 'seeker';

const tabs = document.querySelectorAll('.role-tab');
function paintTabs() {
  tabs.forEach(t => t.classList.toggle('active', t.dataset.role === role));
}
tabs.forEach(t => t.addEventListener('click', () => { role = t.dataset.role; paintTabs(); }));
paintTabs();

const errorBox = document.getElementById('form-error');
document.getElementById('signup-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  errorBox.classList.remove('show');
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Creating account…';
  try {
    await API.post('/api/auth/signup', {
      name: document.getElementById('name').value,
      email: document.getElementById('email').value,
      password: document.getElementById('password').value,
      role,
    });
    window.location.href = '/search.html';
  } catch (err) {
    errorBox.textContent = err.message;
    errorBox.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Create account';
  }
});
</script>
</body>
</html>
