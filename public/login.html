<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Log in — LetsTalkBuddy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@500;600;700;800&family=Karla:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="auth-wrap">
  <a href="/" class="brand" style="font-size:22px;margin-bottom:40px">LetsTalk<em>Buddy</em></a>
  <div class="auth-card" style="max-width:420px">
    <h1>Welcome back</h1>
    <p class="auth-sub">Log in to continue your conversations.</p>

    <div class="form-error" id="form-error"></div>

    <form id="login-form">
      <div style="display:flex;flex-direction:column;gap:14px;margin-bottom:12px">
        <div class="field">
          <label for="email">Email</label>
          <input class="input" id="email" type="email" placeholder="you@example.com" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input class="input" id="password" type="password" placeholder="Your password" required>
        </div>
      </div>

      <div style="text-align:right;margin-bottom:20px">
        <span class="link-accent" style="font-size:13px" onclick="alert('Password reset is not set up yet.')">Forgot password?</span>
      </div>

      <button type="submit" class="btn btn-primary btn-block" id="submit-btn" style="margin-bottom:16px">Log in</button>
    </form>

    <div class="divider"><div></div><span>or</span><div></div></div>

    <button class="btn btn-outline btn-block" style="padding:13px;font-size:14.5px;margin-bottom:20px" onclick="alert('Google sign-in is not set up yet.')">Continue with Google</button>

    <p style="font-size:14px;text-align:center;margin:0" class="muted">New to LetsTalkBuddy? <a href="/signup.html" class="link-accent">Sign up</a></p>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
const errorBox = document.getElementById('form-error');
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  errorBox.classList.remove('show');
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Logging in…';
  try {
    await API.post('/api/auth/login', {
      email: document.getElementById('email').value,
      password: document.getElementById('password').value,
    });
    window.location.href = '/search.html';
  } catch (err) {
    errorBox.textContent = err.message;
    errorBox.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Log in';
  }
});
</script>
</body>
</html>
