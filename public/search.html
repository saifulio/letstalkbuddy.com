<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Find an advisor — LetsTalkBuddy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@500;600;700;800&family=Karla:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
  .cat-children { margin-left: 20px; display: none; }
  .cat-node.open > .cat-children { display: block; }
  .cat-row { display: flex; align-items: center; gap: 4px; padding: 3px 0; }
  .cat-toggle {
    width: 18px; height: 18px;
    border: none; background: none; padding: 0;
    font-size: 11px; color: oklch(55% 0.02 60);
    cursor: pointer; flex-shrink: 0;
    transition: transform .12s;
  }
  .cat-node.open > .cat-row .cat-toggle { transform: rotate(90deg); }
  .cat-spacer { width: 18px; flex-shrink: 0; }
  .cat-row .check-row { flex: 1; }
  .cat-row.top .check-row { font-weight: 700; color: var(--ink); }
</style>
</head>
<body>

<div class="search-nav">
  <a href="/" class="brand" style="font-size:20px;flex-shrink:0">LetsTalk<em>Buddy</em></a>
  <input type="text" class="search-input" id="q" placeholder="Search by name, category, or keyword">
  <div class="nav-auth" id="nav-auth" style="flex-shrink:0">
    <button class="btn btn-outline" style="padding:9px 18px;font-size:13.5px" onclick="location.href='/login.html'">Log in</button>
    <button class="btn btn-primary" style="padding:9px 18px;font-size:13.5px" onclick="location.href='/signup.html'">Sign up</button>
  </div>
</div>

<div class="search-layout">
  <div>
    <h1 style="font-weight:800;font-size:22px;margin:0 0 4px">Find an advisor</h1>
    <p class="small-muted" style="margin:0 0 24px" id="result-count">Loading…</p>

    <div class="toggle" id="online-toggle">
      <span style="font-weight:700;font-size:14px">Online now</span>
      <div class="toggle-track"></div>
    </div>

    <div class="filter-group">
      <div class="filter-title">Category</div>
      <div id="category-filters"></div>
    </div>

    <div class="filter-group">
      <div class="filter-title">Max price per minute</div>
      <input type="range" id="max-rate" min="0.5" max="5" step="0.25" value="5" style="width:100%;accent-color:#E8603C">
      <div style="display:flex;justify-content:space-between;font-size:12.5px" class="small-muted">
        <span>$0.50/min</span><span id="max-rate-label">$5.00/min</span>
      </div>
    </div>

    <div class="filter-group">
      <div class="filter-title">Language</div>
      <div style="display:flex;flex-direction:column;gap:9px">
        <label class="check-row"><input type="checkbox" name="language" value="English">English</label>
        <label class="check-row"><input type="checkbox" name="language" value="Bangla">Bangla</label>
        <label class="check-row"><input type="checkbox" name="language" value="Hindi">Hindi</label>
      </div>
    </div>

    <div class="filter-group">
      <div class="filter-title">Minimum rating</div>
      <div style="display:flex;gap:8px">
        <button class="pill" data-rating="4.5">4.5+</button>
        <button class="pill" data-rating="4.0">4.0+</button>
        <button class="pill active" data-rating="">Any</button>
      </div>
    </div>
  </div>

  <div class="results-grid" id="results"></div>
</div>

<script src="/js/app.js"></script>
<script>
const state = {
  q: '',
  online: false,
  categories: new Set(),
  maxRate: 5,
  languages: new Set(),
  minRating: '',
};

const params = new URLSearchParams(location.search);
if (params.get('category')) state.categories.add(params.get('category'));
if (params.get('q')) {
  state.q = params.get('q');
  document.getElementById('q').value = state.q;
}

function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

async function loadResults() {
  const p = new URLSearchParams();
  if (state.q) p.set('q', state.q);
  if (state.online) p.set('online', '1');
  if (state.categories.size) p.set('categories', [...state.categories].join(','));
  if (state.maxRate < 5) p.set('maxRate', state.maxRate);
  if (state.minRating) p.set('minRating', state.minRating);
  // API supports one language filter; use the first checked one.
  if (state.languages.size) p.set('language', [...state.languages][0]);

  try {
    const { advisors } = await API.get('/api/advisors?' + p.toString());
    document.getElementById('result-count').textContent =
      `${advisors.length} advisor${advisors.length === 1 ? '' : 's'} match your search`;
    document.getElementById('results').innerHTML = advisors.length
      ? advisors.map(a => advisorCardHTML(a, { withBio: true })).join('')
      : '<p class="muted">No advisors match those filters. Try widening your search.</p>';
  } catch (err) {
    document.getElementById('result-count').textContent = '';
    document.getElementById('results').innerHTML =
      `<p class="muted">Could not load advisors: ${escapeHTML(err.message)}</p>`;
  }
}

async function initFilters() {
  const { categories } = await API.get('/api/categories');

  const childrenOf = new Map();
  const parentOf = new Map();
  for (const c of categories) {
    parentOf.set(String(c.id), c.parent_id ? String(c.parent_id) : null);
    if (c.parent_id) {
      if (!childrenOf.has(c.parent_id)) childrenOf.set(c.parent_id, []);
      childrenOf.get(c.parent_id).push(c);
    }
  }

  function renderNode(c, isTop) {
    const kids = childrenOf.get(c.id) || [];
    return `
      <div class="cat-node" data-id="${c.id}">
        <div class="cat-row${isTop ? ' top' : ''}">
          ${kids.length
            ? `<button type="button" class="cat-toggle" aria-label="Expand ${escapeHTML(c.name)}">▶</button>`
            : '<span class="cat-spacer"></span>'}
          <label class="check-row">
            <input type="checkbox" name="category" value="${c.id}" ${state.categories.has(String(c.id)) ? 'checked' : ''}>${escapeHTML(c.name)}
          </label>
        </div>
        ${kids.length ? `<div class="cat-children">${kids.map(k => renderNode(k, false)).join('')}</div>` : ''}
      </div>`;
  }

  const box = document.getElementById('category-filters');
  box.innerHTML = categories.filter(c => !c.parent_id).map(c => renderNode(c, true)).join('');

  box.querySelectorAll('.cat-toggle').forEach(btn =>
    btn.addEventListener('click', () => btn.closest('.cat-node').classList.toggle('open')));

  box.querySelectorAll('input[name="category"]').forEach(cb =>
    cb.addEventListener('change', () => {
      cb.checked ? state.categories.add(cb.value) : state.categories.delete(cb.value);
      loadResults();
    }));

  // Expand the tree down to any category preselected via the URL.
  for (const id of state.categories) {
    for (let p = parentOf.get(id); p; p = parentOf.get(p)) {
      const node = box.querySelector(`.cat-node[data-id="${p}"]`);
      if (node) node.classList.add('open');
    }
    const self = box.querySelector(`.cat-node[data-id="${id}"]`);
    if (self) self.classList.add('open');
  }
}

document.getElementById('q').addEventListener('input', debounce(e => {
  state.q = e.target.value.trim();
  loadResults();
}, 300));

document.getElementById('online-toggle').addEventListener('click', function () {
  state.online = !state.online;
  this.classList.toggle('on', state.online);
  loadResults();
});

document.getElementById('max-rate').addEventListener('input', debounce(e => {
  state.maxRate = Number(e.target.value);
  document.getElementById('max-rate-label').textContent = `$${state.maxRate.toFixed(2)}/min`;
  loadResults();
}, 200));
document.getElementById('max-rate').addEventListener('input', e => {
  document.getElementById('max-rate-label').textContent = `$${Number(e.target.value).toFixed(2)}/min`;
});

document.querySelectorAll('input[name="language"]').forEach(cb =>
  cb.addEventListener('change', () => {
    cb.checked ? state.languages.add(cb.value) : state.languages.delete(cb.value);
    loadResults();
  }));

document.querySelectorAll('.pill').forEach(pill =>
  pill.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    state.minRating = pill.dataset.rating;
    loadResults();
  }));

initFilters().then(loadResults);
</script>
</body>
</html>
